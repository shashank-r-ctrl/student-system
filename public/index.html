<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>🎓 Student System</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

  <div class="card">
    <h3>Add Student</h3>

    <input id="reg" placeholder="Reg">
    <input id="name" placeholder="Name">

    <input id="math" placeholder="Math">
    <input id="science" placeholder="Science">
    <input id="english" placeholder="English">
    <input id="social" placeholder="Social">
    <input id="computer" placeholder="Computer">

    <button onclick="addStudent()">Save</button>

    <h3>Students</h3>
    <div id="list"></div>
  </div>

  <div class="card">
    <h3>🤖 AI Chatbot</h3>

    <div id="chat" class="chatbox"></div>

    <input id="q" placeholder="Ask anything...">
    <button onclick="ask()">Send</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
