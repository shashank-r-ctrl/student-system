<!DOCTYPE html>
<html>
<head>
  <title>Student System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎓 Student Management</h1>

  <input id="reg" placeholder="Registration Number">
  <input id="name" placeholder="Name">

  <h3>Marks</h3>

  <input id="math" placeholder="Math">
  <input id="science" placeholder="Science">
  <input id="english" placeholder="English">
  <input id="social" placeholder="Social">
  <input id="computer" placeholder="Computer">

  <button onclick="addStudent()">Save Student</button>

  <h2>📋 Students</h2>
  <div id="list"></div>

  <h2>🏆 Subject Toppers</h2>
  <table>
    <thead>
      <tr>
        <th>Subject</th>
        <th>Name</th>
        <th>Marks</th>
      </tr>
    </thead>
    <tbody id="toppers"></tbody>
  </table>
</div>

<script src="script.js"></script>
</body>
</html>
