<!DOCTYPE html>
<html>
<head>
<title>Student System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h2>🎓 Student System</h2>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<div class="left">
<div class="card">
<h3>Add Student</h3>

<input id="reg" placeholder="Reg">
<input id="name" placeholder="Name">
<input id="math" placeholder="Math">
<input id="science" placeholder="Science">
<input id="english" placeholder="English">
<input id="social" placeholder="Social">
<input id="computer" placeholder="Computer">

<button onclick="addStudent()">Save</button>
</div>

<div class="card">
<h3>Students</h3>
<div id="list"></div>
</div>
</div>

<div class="right">
<div class="card">
<h3>🏆 Subject Toppers</h3>
<table>
<thead>
<tr><th>Subject</th><th>Name</th><th>Marks</th></tr>
</thead>
<tbody id="topper"></tbody>
</table>
</div>
</div>

</div>

<!-- CHAT BUTTON -->
<div class="chat-btn" onclick="toggleChat()">🤖</div>

<!-- CHAT POPUP -->
<div id="chatPopup" class="chat-popup">

<div class="chat-header">
AI Chat <span onclick="toggleChat()">✖</span>
</div>

<!-- 🔥 SUGGESTIONS -->
<div class="suggestions">
<p onclick="fill('topper')">topper</p>
<p onclick="fill('average')">average marks</p>
<p onclick="fill('compare')">compare students</p>
<p onclick="fill('total of REG1')">total of REG1</p>
</div>

<div id="chat" class="chatbox"></div>

<div class="chat-input">
<input id="q" placeholder="Ask...">
<button onclick="ask()">Send</button>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
